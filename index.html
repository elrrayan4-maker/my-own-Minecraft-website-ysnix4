<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoonNight · ムーンナイト | 幻のMCサーバ</title>
  <!-- Font Awesome 6 (free) for clean icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0710;  /* deep dark base for manga contrast */
      font-family: 'Inter', 'Segoe UI', 'Helvetica Neue', '游ゴシック', 'Yu Gothic', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    /* 和風・manga speed lines & halftone pattern (subtle) */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: 
        repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.01) 0px, rgba(255, 255, 255, 0.01) 2px, 
        transparent 2px, transparent 6px),
        radial-gradient(circle at 20% 30%, rgba(160, 130, 255, 0.03) 0%, transparent 20%);
      pointer-events: none;
      z-index: 0;
    }

    /* main card – clean glassmorphism with purple/white hex */
    .moon-card {
      position: relative;
      z-index: 10;
      max-width: 780px;
      width: 100%;
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(14px) saturate(180%);
      -webkit-backdrop-filter: blur(14px) saturate(180%);
      border: 2px solid rgba(170, 130, 255, 0.35); /* #aa82ff transparent */
      border-radius: 42px 42px 42px 42px;
      box-shadow: 0 30px 50px -15px rgba(0, 0, 0, 0.8),
                  0 0 0 1px rgba(210, 180, 255, 0.2) inset,
                  0 0 30px rgba(160, 120, 255, 0.4);
      padding: 2.8rem 2.5rem;
      transition: transform 0.2s ease;
    }

    /* manga style accent: torn tape / dynamic lines */
    .moon-card::after {
      content: "";
      position: absolute;
      top: -8px; left: 10%; width: 180px; height: 24px;
      background: repeating-linear-gradient(90deg, 
        transparent, 
        transparent 8px, 
        rgba(255, 255, 255, 0.25) 8px, 
        rgba(230, 210, 255, 0.4) 12px);
      filter: drop-shadow(0 4px 2px rgba(0,0,0,0.4));
      transform: rotate(-2deg);
      border-radius: 40% 20% 60% 20%;
      opacity: 0.6;
      pointer-events: none;
    }

    /* moon/night decorative elements (manga speed lines top right) */
    .manga-lines {
      position: absolute;
      top: 20px; right: 20px;
      width: 200px; height: 140px;
      background: radial-gradient(ellipse at 70% 20%, #c9b0ff20 0%, transparent 60%),
                  linear-gradient(135deg, transparent 40%, rgba(255, 255, 255, 0.08) 60%, transparent 80%);
      border-left: 3px solid #b59eff30;
      transform: skewY(-3deg) rotate(2deg);
      pointer-events: none;
      z-index: 5;
    }

    /* headers & text – white / soft purple */
    h1 {
      font-size: 4rem;
      font-weight: 800;
      letter-spacing: 6px;
      color: #ffffff;
      text-shadow: 0 0 8px #c7abff, 0 4px 10px #3d2a68, 3px 3px 0 #6320b3;
      margin-bottom: 0.4rem;
      line-height: 1.1;
      position: relative;
      display: inline-block;
      filter: drop-shadow(0 6px 4px #00000060);
      font-family: 'Inter', 'Impact', 'Helvetica', 'Arial Black', sans-serif;
      text-transform: uppercase;
      transform: scaleY(1.02);
    }

    .japanese-sub {
      font-size: 1.4rem;
      color: #e2d1ff;
      letter-spacing: 4px;
      font-weight: 400;
      margin-bottom: 0.25rem;
      text-shadow: 0 0 6px #b180ff;
      border-left: 4px solid #ffffffcc;
      padding-left: 1.2rem;
      background: linear-gradient(90deg, #aa82ff30, transparent);
      width: fit-content;
    }

    .server-badge {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: #1f1930d0;
      border: 1px solid #c7aaff;
      border-radius: 60px;
      padding: 0.75rem 1.8rem;
      margin: 1.8rem 0 2.2rem 0;
      width: fit-content;
      backdrop-filter: blur(4px);
      box-shadow: 0 0 20px #a25eff60;
    }

    .server-badge i {
      font-size: 2rem;
      color: #d9c0ff;
      filter: drop-shadow(0 0 5px white);
    }

    .server-ip {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 1.9rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff 40%, #e3ccff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 12px #b77eff;
      letter-spacing: 1.5px;
    }

    .server-port {
      font-size: 1.5rem;
      background: #2d2342;
      padding: 0.2rem 1rem;
      border-radius: 40px;
      color: white;
      border: 1px solid #b78eff;
      font-weight: 500;
      margin-left: 0.5rem;
    }

    /* 素晴らしいボタン (professional buttons) — manga style */
    .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem;
      margin: 2.8rem 0 2rem 0;
      justify-content: center;
    }

    .manga-btn {
      flex: 1 1 180px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: #1d152e;  /* deep purple base */
      border: 3px solid #f0eaff;
      border-radius: 20px 8px 30px 8px;  /* asymmetrical manga vibe */
      padding: 1.2rem 1.2rem;
      font-size: 1.7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.8px;
      color: #f5edff;
      text-decoration: none;
      box-shadow: 12px 12px 0 #7c5fb0, 0 10px 30px #a166ff80, 0 0 0 2px #ffffff50 inset;
      transition: all 0.1s cubic-bezier(0.1, 0.9, 0.3, 1.2);
      backdrop-filter: blur(10px);
      background: linear-gradient(145deg, #332353, #1e1338);
      position: relative;
      z-index: 20;
    }

    .manga-btn i {
      font-size: 2.2rem;
      color: #f0e2ff;
      filter: drop-shadow(2px 2px 0 #683db8);
    }

    /* hover effects – extreme manga pop */
    .manga-btn:hover {
      transform: translate(-6px, -6px);
      box-shadow: 18px 18px 0 #a882ff, 0 0 30px #f0e6ff, 0 0 15px #ffffffcc;
      border-color: #ffffff;
      background: #311f55;
      color: #ffffff;
    }

    .manga-btn:active {
      transform: translate(4px, 4px);
      box-shadow: 6px 6px 0 #5f3c9c;
    }

    /* discord specific (keep style unified, just slight color accent) */
    .btn-discord i {
      color: #b8cdff;
    }

    .btn-instagram i {
      color: #ffc9f0;
    }

    /* copy row for direct IP */
    .copy-area {
      display: flex;
      align-items: center;
      background: #140f1fcc;
      border: 2px solid #b597ff;
      border-radius: 50px;
      padding: 0.5rem 0.5rem 0.5rem 2rem;
      margin-top: 2rem;
      backdrop-filter: blur(4px);
      justify-content: space-between;
    }

    .copy-text {
      font-family: monospace;
      font-size: 1.6rem;
      color: white;
      text-shadow: 0 0 6px #bb9eff;
      font-weight: 500;
      word-break: break-word;
    }

    .copy-btn {
      background: #8f6ed6;
      border: 2px solid white;
      border-radius: 40px;
      padding: 0.8rem 2rem;
      font-size: 1.4rem;
      font-weight: bold;
      color: #1d0f2b;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: 0.1s ease;
      cursor: pointer;
      box-shadow: 5px 5px 0 #3f2670;
    }

    .copy-btn i {
      font-size: 1.6rem;
      color: white;
    }

    .copy-btn:hover {
      background: #b28eff;
      transform: scale(1.02);
      box-shadow: 8px 8px 0 #482c7a;
    }

    .copy-btn:active {
      transform: translate(5px, 5px);
      box-shadow: 2px 2px 0 #2e1b50;
    }

    /* footer / extra manga quote */
    .manga-quote {
      margin-top: 2.5rem;
      color: #d7c6ff;
      text-align: center;
      font-size: 1.2rem;
      font-style: italic;
      border-top: 2px dashed #aa82ff80;
      padding-top: 1.8rem;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 20" width="40" height="20"><circle cx="5" cy="5" r="3" fill="%23c7aaff30"/><circle cx="25" cy="12" r="4" fill="%23ffffff20"/></svg>') repeat-x top;
      background-size: 48px 24px;
    }

    .manga-quote span {
      background: #281f3a;
      padding: 0.2rem 1.5rem;
      border-radius: 40px;
      border-left: 6px solid #dec4ff;
    }

    /* responsive */
    @media (max-width: 550px) {
      h1 { font-size: 2.8rem; letter-spacing: 3px; }
      .japanese-sub { font-size: 1.1rem; }
      .server-ip { font-size: 1.5rem; }
      .manga-btn { font-size: 1.3rem; padding: 0.9rem; }
      .copy-text { font-size: 1.2rem; }
    }

    /* ip & port white/purple hex explicit */
    .hex-highlight {
      color: #ffffff;
      background: #9b7bda30;
      padding: 0.1rem 0.8rem;
      border-radius: 24px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="manga-lines"></div>
  <main class="moon-card">
    <!-- 月夜のタイトル -->
    <div class="japanese-sub">月夜のサーバ - ムーンナイト</div>
    <h1>MOONNIGHT</h1>
    <!-- server badge with IP:PORT -->
    <div class="server-badge">
      <i class="fas fa-cubes"></i>
      <span class="server-ip">moonnight.mineplay.pro</span>
      <span class="server-port">:25002</span>
    </div>

    <!-- プロフェッショナルボタングループ (Discord, Instagram, plus copy IP) -->
    <div class="button-group">
      <!-- Discord button with link -->
      <a href="https://discord.com/invite/moonnight" class="manga-btn btn-discord" target="_blank" rel="noopener">
        <i class="fab fa-discord"></i> Discord
      </a>
      <!-- Instagram button with link -->
      <a href="https://www.instagram.com/moonnight_mc?igsh=MWRjNGJvbWUzejl5Nw==" class="manga-btn btn-instagram" target="_blank" rel="noopener">
        <i class="fab fa-instagram"></i> Instagram
      </a>
    </div>

    <!-- Extra copy row for IP and port (also copy function) -->
    <div class="copy-area" id="copy-ip-block">
      <span class="copy-text" id="server-address">moonnight.mineplay.pro:25002</span>
      <button class="copy-btn" id="copyBtn" aria-label="Copy server IP and port">
        <i class="fas fa-copy"></i> <span>COPY</span>
      </button>
    </div>

    <!-- 説明 / 漫画風 (text about server) -->
    <div class="manga-quote">
      <span>⚡ 月夜に輝く最強のマインクラフト体験 ⚡<br> join the moon night ・ 白と紫の世界</span>
    </div>

    <!-- hidden textarea for copy fallback (accessibility) -->
    <textarea id="copy-target" style="position: absolute; left: -9999px; top: 0;" readonly>moonnight.mineplay.pro:25002</textarea>
  </main>

  <script>
    (function() {
      // Professional copy function with user feedback (manga style)
      const copyBtn = document.getElementById('copyBtn');
      const copySpan = copyBtn.querySelector('span');
      const originalText = copySpan.innerText;
      const serverFull = 'moonnight.mineplay.pro:25002';

      // method 1: modern clipboard API
      function copyToClipboard() {
        // try using modern clipboard api
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(serverFull).then(() => {
            feedbackCopy();
          }).catch(() => {
            fallbackCopy();
          });
        } else {
          fallbackCopy();
        }
      }

      function fallbackCopy() {
        const textarea = document.getElementById('copy-target');
        if (textarea) {
          textarea.value = serverFull;
          textarea.select();
          document.execCommand('copy');
          feedbackCopy();
        } else {
          alert('Please copy manually: ' + serverFull);
        }
      }

      function feedbackCopy() {
        copySpan.innerText = 'COPIED!';
        copyBtn.style.background = '#b286ff';
        copyBtn.style.boxShadow = '8px 8px 0 #6230b0';
        setTimeout(() => {
          copySpan.innerText = originalText;
          copyBtn.style.background = '#8f6ed6';
          copyBtn.style.boxShadow = '5px 5px 0 #3f2670';
        }, 1800);
      }

      copyBtn.addEventListener('click', (e) => {
        e.preventDefault();
        copyToClipboard();
      });

      // optional: auto-select if user clicks on the ip area
      document.getElementById('copy-ip-block').addEventListener('click', function(e) {
        // if click is not directly on button, still allow but we only trigger from button.
        // but if user clicks on the text maybe we help them? better just button.
      });

      // nice hover effect: ip badge glows
    })();
  </script>

  <!-- Additional subtle hex purple/white note: pure hex used in border and shadows (#aa82ff, #b597ff etc) -->
  <!-- 
    hex colors used: 
    - purple variants: #aa82ff, #b597ff, #a166ff, #8f6ed6, #9b7bda, #c7abff, #b59eff, #a882ff, #7c5fb0, #683db8
    - white: #ffffff, #f5edff, #f0eaff
    all matching purple/white theme.
  -->
</body>
</html>
