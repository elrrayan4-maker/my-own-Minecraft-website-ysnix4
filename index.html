<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>MoonNight · موون نايت</title>
  <!-- Font Awesome 6 (مجاني) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* reset و القواعد الأساسية */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0c0818;  /* خلفية عميقة تظهر التباين */
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      position: relative;
    }

    /* خلفية مانغا خفيفة (خطوط سرعة ونقاط) */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: 
        repeating-linear-gradient(45deg, rgba(190, 150, 255, 0.03) 0px, rgba(255, 255, 255, 0.02) 1px, transparent 2px, transparent 8px),
        radial-gradient(circle at 80% 20%, #a57cff10 0%, transparent 30%);
      pointer-events: none;
      z-index: 0;
    }

    /* البطاقة الرئيسية - زجاجية فاخرة مع حواف مانهوا */
    .moon-card {
      position: relative;
      z-index: 20;
      width: 100%;
      max-width: 560px;  /* أضيق قليلاً ليتناسب مع اليد */
      background: rgba(20, 12, 35, 0.7);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 2px solid rgba(180, 130, 255, 0.5);
      border-radius: 48px 48px 48px 48px;
      box-shadow: 0 25px 50px -10px #000000dd, 0 0 0 1.5px #b68eff80 inset, 0 0 40px #a06eff50;
      padding: 2.2rem 1.8rem;
      transition: all 0.2s ease;
    }

    /* لمسة مانغا: شريط لاصق في الأعلى */
    .moon-card::after {
      content: "";
      position: absolute;
      top: -6px; left: 15%;
      width: 130px;
      height: 20px;
      background: repeating-linear-gradient(90deg, transparent, transparent 6px, rgba(255, 255, 255, 0.3) 6px, rgba(230, 200, 255, 0.6) 10px);
      filter: drop-shadow(0 3px 2px black);
      transform: rotate(-2deg);
      border-radius: 20% 40% 30% 50%;
      opacity: 0.7;
    }

    /* العناوين الرئيسية */
    .japanese-sub {
      font-size: 1.3rem;
      color: #f0e2ff;
      letter-spacing: 2px;
      font-weight: 400;
      margin-bottom: 0.15rem;
      border-left: 4px solid #d4b5ff;
      padding-left: 1rem;
      background: linear-gradient(90deg, #946eff30, transparent);
      width: fit-content;
      text-shadow: 0 0 5px #b082ff;
    }

    h1 {
      font-size: 3.8rem;
      font-weight: 900;
      letter-spacing: 4px;
      color: white;
      text-shadow: 0 0 12px #c9a8ff, 0 5px 0 #422b70, 4px 4px 0 #2f1c55;
      line-height: 1.1;
      margin-bottom: 0.5rem;
      word-break: break-word;
    }

    /* أي بي وبورت */
    .server-badge {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.7rem 1rem;
      background: #1a1130e0;
      border: 1.5px solid #c7aaff;
      border-radius: 60px;
      padding: 0.8rem 1.5rem;
      margin: 1.5rem 0 2rem;
      backdrop-filter: blur(4px);
      box-shadow: 0 0 20px #a066ff, 0 6px 0 #3a2660;
    }

    .server-badge i {
      font-size: 2rem;
      color: #dcc7ff;
    }

    .server-ip {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 1.7rem;
      font-weight: 700;
      background: linear-gradient(145deg, #fff, #eeddff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .server-port {
      font-size: 1.5rem;
      background: #362657;
      padding: 0.3rem 1.2rem;
      border-radius: 40px;
      color: white;
      border: 1px solid #d4adff;
      font-weight: 600;
    }

    /* أزرار احترافية متجاوبة - بحجم مناسب للمس */
    .button-group {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 1rem;
      margin: 2.5rem 0 1.8rem;
    }

    .manga-btn {
      flex: 1 1 170px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #1d1438;
      border: 2.5px solid #f5ebff;
      border-radius: 30px 8px 30px 8px;  /* زوايا مانغا غير منتظمة */
      padding: 1.2rem 0.8rem;
      font-size: 1.5rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #faf4ff;
      text-decoration: none;
      box-shadow: 8px 8px 0 #744fc7, 0 0 20px #c49eff;
      transition: all 0.12s ease;
      background: linear-gradient(145deg, #2a1c48, #191132);
      min-width: 160px;
    }

    .manga-btn i {
      font-size: 2rem;
      filter: drop-shadow(2px 2px 0 #4a2d84);
    }

    /* hover يعمل على الأجهزة التي تدعمه بشكل جيد */
    @media (hover: hover) {
      .manga-btn:hover {
        transform: translate(-5px, -5px);
        box-shadow: 14px 14px 0 #a275ff, 0 0 35px #ffffffc0;
        background: #39296b;
      }
    }

    .manga-btn:active {
      transform: translate(4px, 4px);
      box-shadow: 4px 4px 0 #613fad;
    }

    /* منطقة النسخ المحسنة */
    .copy-smart {
      display: flex;
      align-items: center;
      background: #0f0b1dd0;
      border: 2px solid #b185ff;
      border-radius: 50px;
      padding: 0.35rem 0.35rem 0.35rem 1.8rem;
      margin: 1.8rem 0 2rem;
      backdrop-filter: blur(6px);
      flex-wrap: wrap;
    }

    .copy-ip-preview {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.5rem;
      color: white;
      text-shadow: 0 0 8px #c9adff;
      font-weight: 600;
      flex: 1 1 auto;
      word-break: break-word;
    }

    .copy-action {
      background: #9f7ce2;
      border: none;
      border-radius: 50px;
      padding: 1rem 2rem;
      font-size: 1.4rem;
      font-weight: bold;
      color: #150e24;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      transition: 0.1s ease;
      cursor: pointer;
      box-shadow: 5px 5px 0 #452c78;
      border: 1.5px solid white;
      margin: 0.3rem;
    }

    .copy-action i {
      font-size: 1.7rem;
      color: white;
    }

    .copy-action:active {
      transform: translate(5px, 5px);
      box-shadow: 2px 2px 0 #3a2463;
    }

    /* اقتباس مانغا */
    .manga-quote {
      margin: 1.8rem 0 0.5rem;
      color: #e6d2ff;
      text-align: center;
      font-size: 1.1rem;
      border-top: 2px dashed #ad85ff;
      padding-top: 1.5rem;
      background: url('data:image/svg+xml;utf8,<svg width="30" height="16" viewBox="0 0 30 16" xmlns="http://www.w3.org/2000/svg"><circle cx="6" cy="8" r="4" fill="%23b28eff60"/><circle cx="22" cy="6" r="3" fill="%23ffffff40"/></svg>') repeat-x top;
    }

    .manga-quote span {
      background: #231b36e0;
      padding: 0.4rem 1.5rem;
      border-radius: 60px;
      border-left: 6px solid #dbbaff;
      display: inline-block;
      backdrop-filter: blur(2px);
    }

    /* التنقل السفلي السريع (مثل التطبيقات) - رائع للهواتف */
    .mobile-quick-nav {
      display: flex;
      justify-content: space-around;
      align-items: center;
      background: rgba(25, 15, 45, 0.8);
      backdrop-filter: blur(20px);
      border-radius: 60px;
      padding: 0.7rem 1rem;
      margin-top: 2rem;
      border: 1.5px solid #bb99ff;
      box-shadow: 0 8px 0 #341f55;
    }

    .quick-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #eddbff;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      gap: 5px;
      transition: 0.1s;
      padding: 0.2rem 0.8rem;
      border-radius: 40px;
    }

    .quick-item i {
      font-size: 1.8rem;
      color: white;
      filter: drop-shadow(0 2px 3px black);
    }

    .quick-item:active {
      background: #573fa0;
      color: white;
    }

    /* تحسينات للهواتف الصغيرة */
    @media (max-width: 450px) {
      .moon-card {
        padding: 1.8rem 1.2rem;
        border-radius: 38px;
      }
      h1 {
        font-size: 2.9rem;
        letter-spacing: 2px;
      }
      .japanese-sub {
        font-size: 1rem;
      }
      .server-ip {
        font-size: 1.4rem;
      }
      .server-port {
        font-size: 1.2rem;
      }
      .manga-btn {
        font-size: 1.2rem;
        padding: 1rem 0.2rem;
      }
      .copy-ip-preview {
        font-size: 1.2rem;
      }
      .copy-action {
        padding: 0.8rem 1.5rem;
        font-size: 1.2rem;
      }
      .quick-item i {
        font-size: 1.5rem;
      }
    }

    /* إصلاح صغير لأيقونات iOS */
    .fab, .fas {
      font-smoothing: antialiased;
    }
  </style>
</head>
<body>
  <div class="moon-card">
    <!-- عنوان ياباني -->
    <div class="japanese-sub">月夜のムーンナイト</div>
    <h1>MOONNIGHT</h1>

    <!-- عرض السيرفر بشكل بارز -->
    <div class="server-badge">
      <i class="fas fa-moon"></i>
      <span class="server-ip">moonnight.mineplay.pro</span>
      <span class="server-port">25002</span>
    </div>

    <!-- أزرار أساسية احترافية (Discord + Instagram) -->
    <div class="button-group">
      <a href="https://discord.com/invite/moonnight" class="manga-btn" target="_blank" rel="noopener">
        <i class="fab fa-discord"></i> Discord
      </a>
      <a href="https://www.instagram.com/moonnight_mc?igsh=MWRjNGJvbWUzejl5Nw==" class="manga-btn" target="_blank" rel="noopener">
        <i class="fab fa-instagram"></i> Instagram
      </a>
    </div>

    <!-- حقل نسخ متطور وواضح للجميع -->
    <div class="copy-smart" id="copy-smart-panel">
      <span class="copy-ip-preview" id="serverFullAddress">moonnight.mineplay.pro:25002</span>
      <button class="copy-action" id="copyMasterBtn">
        <i class="fas fa-copy"></i> <span id="copyBtnText">نسخ</span>
      </button>
    </div>

    <!-- اقتباس أنمي قصير -->
    <div class="manga-quote">
      <span>⚡ 白と紫の世界へ  ·  Join the MoonNight ⚡</span>
    </div>

    <!-- قائمة تنقل سفلية على طريقة التطبيقات (للهواتف) -->
    <div class="mobile-quick-nav">
      <a href="https://discord.com/invite/moonnight" class="quick-item" target="_blank">
        <i class="fab fa-discord"></i>
        <span>ديسكورد</span>
      </a>
      <a href="https://www.instagram.com/moonnight_mc?igsh=MWRjNGJvbWUzejl5Nw==" class="quick-item" target="_blank">
        <i class="fab fa-instagram"></i>
        <span>انستقرام</span>
      </a>
      <div class="quick-item" id="quickCopy" style="cursor: pointer;">
        <i class="fas fa-copy"></i>
        <span>نسخ IP</span>
      </div>
    </div>

    <!-- حقل مساعد للنسخ (مخفي) -->
    <textarea id="hiddenCopyArea" style="position: absolute; left: -9999px; top: 0;" readonly>moonnight.mineplay.pro:25002</textarea>
  </div>

  <script>
    (function() {
      const fullServerText = "moonnight.mineplay.pro:25002";

      // عناصر التحكم
      const copyMainBtn = document.getElementById('copyMasterBtn');
      const copyBtnSpan = document.getElementById('copyBtnText');
      const quickCopyDiv = document.getElementById('quickCopy');
      const hiddenArea = document.getElementById('hiddenCopyArea');

      // دالة النسخ مع الفيدباك
      function performCopy(triggerElement) {
        // استخدام Clipboard API الحديث
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(fullServerText).then(() => {
            showCopyFeedback(triggerElement);
          }).catch(() => {
            fallbackCopy();
          });
        } else {
          fallbackCopy();
        }
      }

      function fallbackCopy() {
        hiddenArea.value = fullServerText;
        hiddenArea.select();
        document.execCommand('copy');
        showCopyFeedback();
      }

      function showCopyFeedback(trigger) {
        // تغيير النص في الزر الرئيسي
        if (copyBtnSpan) {
          const originalText = copyBtnSpan.innerText;
          copyBtnSpan.innerText = 'تم النسخ!';
          if (copyMainBtn) {
            copyMainBtn.style.background = '#b78eff';
            copyMainBtn.style.boxShadow = '8px 8px 0 #5b3994';
          }
          setTimeout(() => {
            copyBtnSpan.innerText = originalText;
            if (copyMainBtn) {
              copyMainBtn.style.background = '#9f7ce2';
              copyMainBtn.style.boxShadow = '5px 5px 0 #452c78';
            }
          }, 1600);
        }

        // تغيير بسيط لأيقونة النسخ السريع (اختياري)
        if (quickCopy) {
          const originalHtml = quickCopy.innerHTML;
          quickCopy.innerHTML = '<i class="fas fa-check"></i><span>تم</span>';
          setTimeout(() => {
            quickCopy.innerHTML = '<i class="fas fa-copy"></i><span>نسخ IP</span>';
          }, 1600);
        }
      }

      // إضافة الأحداث
      if (copyMainBtn) {
        copyMainBtn.addEventListener('click', (e) => {
          e.preventDefault();
          performCopy(copyMainBtn);
        });
      }

      if (quickCopy) {
        quickCopy.addEventListener('click', (e) => {
          e.preventDefault();
          performCopy(quickCopy);
        });
      }

      // اختياري: النقر على preview ينسخ أيضاً (للي يحب السرعة)
      const previewSpan = document.querySelector('.copy-ip-preview');
      if (previewSpan) {
        previewSpan.addEventListener('click', () => {
          performCopy(previewSpan);
        });
      }
    })();
  </script>
</body>
</html>
